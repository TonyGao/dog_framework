App\Entity\Platform\DataSource:
  position_level_datasource:
    name: 'Position Level DataSource'
    type: 'entity'
    resource: 'App\Entity\Organization\PositionLevel'
    query: null
    params: null
    databaseConnection: null

App\Entity\Platform\DataGrid:
  position_level_datagrid:
    name: 'Position Level DataGrid'
    description: '岗位级别管理数据表格配置'
    dataSource: '@position_level_datasource'
    defaultConfigData:
      columns:
        - field: 'id'
          label: 'ID'
          visible: false
          width: 80
          sortable: true
        - field: 'name'
          label: '级别名称'
          visible: true
          width: 150
          sortable: true
        - field: 'code'
          label: '级别编码'
          visible: true
          width: 120
          sortable: true
        - field: 'levelOrder'
          label: '级别序号'
          visible: true
          width: 100
          sortable: true
        - field: 'salaryMin'
          label: '薪资下限'
          visible: true
          width: 120
          sortable: true
        - field: 'salaryMax'
          label: '薪资上限'
          visible: true
          width: 120
          sortable: true
        - field: 'state'
          label: '状态'
          visible: true
          width: 80
          sortable: true
          type: 'boolean'
          trueText: '启用'
          falseText: '禁用'
        - field: 'actions'
          label: '操作'
          visible: true
          width: 150
          sortable: false
          type: 'actions'
      sort:
        - field: 'levelOrder'
          order: 'asc'
      pageSize: 20
      pageSizeOptions: [10, 20, 50, 100]
