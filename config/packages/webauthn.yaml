# Please see the following page for more information: https://webauthn-doc.spomky-labs.com/the-webauthn-server/the-symfony-way#configuration

webauthn:
  credential_repository: 'App\Repository\Security\WebauthnCredentialRepository'
  user_repository: 'App\Repository\Organization\EmployeeRepository'
  creation_profiles:
    default:
      rp:
        name: '%env(RELYING_PARTY_NAME)%'
        id: '%env(RELYING_PARTY_ID)%'
      public_key_credential_parameters:
        - -7 # ES256
        - -257 # RS256
      authenticator_selection_criteria:
        resident_key: required
        user_verification: required
  request_profiles:
    default:
      rp_id: '%env(RELYING_PARTY_ID)%'
      user_verification: required

  # Global configuration for allowed origins (required for local development to bypass HTTPS check)
  allowed_origins: ['http://localhost:8000']

  controllers:
    enabled: true
    creation:
      register:
        options_path: '/user/webauthn/register/options'
        result_path: '/user/webauthn/register/result'
        user_entity_guesser: 'Webauthn\Bundle\Security\Guesser\CurrentUserEntityGuesser'
    request:
      login:
        options_path: '/login/webauthn/options'
        result_path: '/login/webauthn/result'
